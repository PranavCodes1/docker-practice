apiVersion: apps/v1

kind: Deployment

metadata:
  name: sample-app-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: sample-app

  template:
    metadata:
      labels:
        app: sample-app

    spec:
      containers:
        - name: sample-app-container
          image: pranavcodes1/sample-app
          ports:
            - containerPort: 5000
